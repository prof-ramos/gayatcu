[theme]
base = "dark"
primaryColor = "#22c55e"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#111827"
textColor = "#e5e7eb"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "minimal"

[server]
runOnSave = true
maxUploadSize = 200
maxMessageSize = 200
headless = true

[logger]
level = "info"

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[runner]
fastReruns = false
magicEnabled = false
